<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제품 입고 일정 캘린더</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="calendar.css">
</head>
<body>
  <header>
    <div class="header-left">
      <a href="/" class="back-btn">← 대시보드</a>
      <h1>제품 입고 일정 캘린더</h1>
      <span id="updated-at"></span>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <div class="view-toggle">
        <button class="view-btn active" id="btn-month" onclick="setView('month')">월</button>
        <button class="view-btn" id="btn-week" onclick="setView('week')">주</button>
      </div>
      <button class="nav-btn" id="prev-btn">&#8249;</button>
      <span id="period-label" style="color:#fff;font-weight:700;font-size:1rem;min-width:130px;text-align:center;"></span>
      <button class="nav-btn" id="next-btn">&#8250;</button>
      <button id="refresh-btn" onclick="loadCalendar()">새로고침</button>
    </div>
  </header>

  <main>
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>데이터를 불러오는 중...</p>
    </div>
    <div id="error-screen" class="error-screen hidden">
      <p id="error-msg"></p>
      <button onclick="loadCalendar()">다시 시도</button>
    </div>
    <div id="calendar-wrap" class="hidden">
      <div class="calendar-grid" id="calendar-grid"></div>
    </div>
  </main>

  <!-- 상세 모달 -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span id="modal-date"></span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- 상세 팝업 -->
  <div id="detail-overlay" class="detail-overlay hidden" onclick="closeDetailPopup()">
    <div class="detail-box" onclick="event.stopPropagation()">
      <button class="detail-close" onclick="closeDetailPopup()">✕</button>
      <div class="detail-img-wrap">
        <img id="detail-img" src="" alt="도식화" onerror="this.style.display='none'">
        <div id="detail-img-placeholder" class="detail-img-placeholder">👕</div>
      </div>
      <div class="detail-body">
        <div class="detail-title" id="detail-name"></div>
        <div class="detail-grid">
          <div class="detail-row"><span class="detail-label">복종</span><span class="detail-val" id="d-category"></span></div>
          <div class="detail-row"><span class="detail-label">품번</span><span class="detail-val" id="d-itemNo"></span></div>
          <div class="detail-row"><span class="detail-label">컬러명</span><span class="detail-val" id="d-color"></span></div>
          <div class="detail-row"><span class="detail-label">수량</span><span class="detail-val" id="d-quantity"></span></div>
          <div class="detail-row"><span class="detail-label">담당 디자이너</span><span class="detail-val" id="d-designer"></span></div>
          <div class="detail-row"><span class="detail-label">업체</span><span class="detail-val" id="d-vendor"></span></div>
          <div class="detail-row"><span class="detail-label">소재명</span><span class="detail-val" id="d-material"></span></div>
          <div class="detail-row"><span class="detail-label">중량</span><span class="detail-val" id="d-weight"></span></div>
          <div class="detail-row detail-row-full"><span class="detail-label">섬유 혼용율</span><span class="detail-val" id="d-fiber"></span></div>
          <div class="detail-row"><span class="detail-label">KC NO</span><span class="detail-val" id="d-kcno"></span></div>
          <div class="detail-row"><span class="detail-label">제조연월</span><span class="detail-val" id="d-mfgDate"></span></div>
          <div class="detail-row"><span class="detail-label">원산지</span><span class="detail-val" id="d-origin"></span></div>
        </div>
      </div>
    </div>
  </div>

  <script src="detail-popup.js"></script>
  <script src="calendar.js"></script>
</body>
</html>
