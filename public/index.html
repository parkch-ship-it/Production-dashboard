<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>의류생산공정 현황 대시보드</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-left">
      <h1>의류생산공정 현황 대시보드</h1>
      <span id="updated-at"></span>
    </div>
    <div style="display:flex;gap:10px;">
      <a href="/products.html" target="_blank" class="product-list-btn">📋 전체 제품 리스트</a>
      <a href="/calendar.html" target="_blank" class="calendar-link-btn">📅 제품 입고 일정 캘린더</a>
      <button id="refresh-btn" onclick="loadData()">새로고침</button>
    </div>
  </header>

  <main>
    <!-- 인증 화면 -->
    <div id="auth-screen" class="auth-screen hidden">
      <div class="auth-box">
        <div class="auth-icon">🔐</div>
        <h2>구글 계정 인증 필요</h2>
        <p>스프레드시트에 접근하려면 구글 계정 인증이 필요합니다.</p>
        <a href="/auth" class="auth-btn">구글 계정으로 인증하기</a>
      </div>
    </div>

    <!-- 로딩 -->
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>데이터를 불러오는 중...</p>
    </div>

    <!-- 오류 -->
    <div id="error-screen" class="error-screen hidden">
      <p id="error-msg"></p>
      <button onclick="loadData()">다시 시도</button>
    </div>

    <!-- 대시보드 콘텐츠 -->
    <div id="dashboard" class="hidden">
      <!-- 요약 통계 -->
      <section class="summary-bar">
        <div class="summary-card">
          <span class="summary-label">전체 제품</span>
          <span class="summary-value" id="total-products">-</span>
        </div>
        <div class="summary-card">
          <span class="summary-label">전체 공정 수</span>
          <span class="summary-value" id="total-processes">-</span>
        </div>
        <div class="summary-card highlight-green">
          <span class="summary-label">평균 진행률</span>
          <span class="summary-value" id="avg-progress">-</span>
        </div>
        <div class="summary-card highlight-red">
          <span class="summary-label">미진행 최다 공정</span>
          <span class="summary-value" id="most-delayed">-</span>
        </div>
      </section>

      <!-- 공정별 카드 -->
      <section class="process-grid" id="process-grid"></section>

      <!-- 미진행 제품 전체 리스트 -->
      <section class="not-started-section">
        <h2>공정별 미진행 제품 목록</h2>
        <div id="not-started-tables"></div>
      </section>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
